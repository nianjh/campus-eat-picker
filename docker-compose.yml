services:
  # ─── 达梦数据库 DM8 ──────────────────────
  dm8:
    image: registry.cn-shanghai.aliyuncs.com/techerwang/dbhub:jem_dm8
    container_name: campus-dm8
    entrypoint: ["/bin/sh", "/dm8-init/startup.sh"]
    ports:
      - "5236:5236"
    volumes:
      - dm8_data:/dm8/data
      - ./dm8-init:/dm8-init:ro
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "export LD_LIBRARY_PATH=/dm8/bin && printf 'SELECT 1;\\nEXIT;\\n' | /dm8/bin/disql SYSDBA/Ajiahao987*@localhost:5236 2>/dev/null | grep -q 'used time'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Spring Boot 后端 ────────────────────
  spring-boot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:dm://dm8:5236/DAMENG?useUnicode=true&characterEncoding=UTF-8&compatibleMode=mysql
      SPRING_DATASOURCE_USERNAME: SYSDBA
      SPRING_DATASOURCE_PASSWORD: "Ajiahao987*"
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      dm8:
        condition: service_healthy
    networks:
      - campus-net
    restart: unless-stopped

  # ─── Nginx 前端 + 反向代理 ────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: campus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - spring-boot
    networks:
      - campus-net
    restart: unless-stopped

volumes:
  dm8_data:
    driver: local

networks:
  campus-net:
    driver: bridge
